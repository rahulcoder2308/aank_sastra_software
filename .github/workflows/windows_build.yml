name: Build Windows Installer

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      # ── 1. Checkout Code ────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Setup Flutter ────────────────────────────────────────────
      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      # ── 3. Enable Windows Desktop Support ───────────────────────────
      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      # ── 4. Install Dart/Flutter dependencies ────────────────────────
      - name: Install dependencies
        run: flutter pub get

      # ── 5. Build Flutter Windows Release ────────────────────────────
      - name: Build Windows Release
        run: flutter build windows --release

      # ── 6. Ensure Inno Setup is available ──────────────────────────
      - name: Install / Verify Inno Setup
        run: |
          # Install latest version; --force prevents failure if already installed
          choco install innosetup -y --force
        shell: powershell

      # ── 7. Compile Installer with Inno Setup ────────────────────────
      - name: Build Installer (.exe)
        run: |
          # Find ISCC.exe regardless of exact Inno Setup version installed
          $iscc = Get-ChildItem "C:\Program Files (x86)\Inno Setup*\ISCC.exe" | Select-Object -First 1 -ExpandProperty FullName
          Write-Host "Using Inno Setup compiler: $iscc"
          & $iscc "installer\aank_sastra_installer.iss"
        shell: powershell

      # ── 8. Upload Raw Build Artifacts ───────────────────────────────
      - name: Upload raw Windows build
        uses: actions/upload-artifact@v4
        with:
          name: windows-raw-build
          path: build/windows/x64/runner/Release/
          retention-days: 7

      # ── 9. Upload Installer ─────────────────────────────────────────
      - name: Upload Installer
        uses: actions/upload-artifact@v4
        with:
          name: AankSastra-Windows-Installer
          path: build/installer/AankSastra_Setup_v*.exe
          retention-days: 30
