name: Build Windows Installer

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      # ── 1. Checkout Code ────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Setup Flutter ────────────────────────────────────────────
      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      # ── 3. Cache Pub dependencies ───────────────────────────────────
      - name: Cache Pub dependencies
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.LOCALAPPDATA }}\Pub\Cache
          key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      # ── 4. Enable Windows Desktop Support ───────────────────────────
      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      # ── 5. Install Dart/Flutter dependencies ────────────────────────
      - name: Install dependencies
        run: flutter pub get

      # ── 6. Build Flutter Windows Release ────────────────────────────
      - name: Build Windows Release
        run: flutter build windows --release

      # ── 7. Compile Installer with Inno Setup ────────────────────────
      # Note: Inno Setup is pre-installed on the windows-latest runner
      - name: Download VC++ Redistributable
        run: |
          Invoke-WebRequest -Uri "https://aka.ms/vs/17/release/vc_redist.x64.exe" -OutFile "installer\vc_redist.x64.exe"
        shell: powershell

      - name: Build Installer (.exe)
        run: |
          # Use pre-installed Inno Setup compiler (ISCC.exe)
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "installer\aank_sastra_installer.iss"
        shell: powershell

      # ── 8. Upload Artifacts (Compression prioritized) ────────────────
      - name: Upload Installer
        uses: actions/upload-artifact@v4
        with:
          name: AankSastra-Windows-Installer
          path: build/installer/AankSastra_Setup_v*.exe
          retention-days: 14
          compression-level: 9
